# ── Admin API Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
  labels:
    app: admin-api
    component: control-plane
spec:
  replicas: {{ .Values.adminApi.replicaCount }}
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
        component: control-plane
    spec:
      containers:
        - name: admin-api
          image: "{{ .Values.adminApi.image.repository }}:{{ .Values.adminApi.image.tag }}"
          imagePullPolicy: {{ .Values.adminApi.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.adminApi.port }}
              name: http
          env:
            {{- range .Values.adminApi.env }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- end }}
              {{- if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.adminApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: admin-api
  ports:
    - port: {{ .Values.adminApi.port }}
      targetPort: http
      name: http
  type: ClusterIP
