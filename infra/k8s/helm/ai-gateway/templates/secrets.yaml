# ── Secrets Template ──
apiVersion: v1
kind: Secret
metadata:
  name: ai-gateway-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  gemini-api-key: "REPLACE_WITH_YOUR_GEMINI_API_KEY"
  database-url: "postgresql://aigateway:REPLACE_PASSWORD@postgresql:5432/aigateway"
  postgres-password: "REPLACE_WITH_STRONG_PASSWORD"
  jwt-secret: "REPLACE_WITH_RANDOM_JWT_SECRET"
---
# ── Namespace ──
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    app: ai-gateway
